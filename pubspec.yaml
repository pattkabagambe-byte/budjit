name: cashflo
description: "Cashflo — Personal Finance & Budget Planner & Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.5.5
  google_fonts: ^6.2.1
  google_mobile_ads: ^5.3.0
  purchases_flutter: ^8.8.1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  firebase_analytics: ^11.4.5
  firebase_crashlytics: ^4.3.5
  share_plus: ^13.1.0
  pdf: ^3.12.0
  excel: ^4.0.6
  intl: ^0.19.0
  in_app_review: ^2.0.11
  url_launcher: ^6.3.1
  fl_chart: ^0.69.0
  package_info_plus: ^10.1.0
  uuid: ^4.5.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  local_auth: ^2.3.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.2
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/budgit_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/budgit_icon.png
  adaptive_icon_background: "#8A2638"
  adaptive_icon_foreground: assets/budgit_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
